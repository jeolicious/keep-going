<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Six Seven</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #splash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      cursor: pointer;
    }

    #splash .splash-icon {
      font-size: 70px;
      margin-bottom: 16px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    #splash .splash-label {
      font-family: 'Georgia', serif;
      font-size: 15px;
      color: #888;
      letter-spacing: 0.12em;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 0.6; }
      50%       { transform: scale(1.15); opacity: 1;   }
    }

    .hands-container {
      display: flex;
      gap: 80px;
      align-items: center;
    }

    .hand-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .number-badge {
      font-family: 'Georgia', serif;
      font-size: 72px;
      font-weight: 900;
      color: #ffffff;
      -webkit-text-stroke: 3px #000000;
      line-height: 1;
      user-select: none;
    }

    @keyframes handUp {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-38px); }
      100% { transform: translateY(0px); }
    }
    @keyframes handDown {
      0%   { transform: translateY(0px) scaleX(-1); }
      50%  { transform: translateY(38px) scaleX(-1); }
      100% { transform: translateY(0px) scaleX(-1); }
    }
    @keyframes numUp {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-38px); }
      100% { transform: translateY(0px); }
    }
    @keyframes numDown {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(38px); }
      100% { transform: translateY(0px); }
    }

    .hand-unit.left  .number-badge { animation: numUp    2s ease-in-out infinite; }
    .hand-unit.left  .hand-svg     { animation: handUp   2s ease-in-out infinite; }
    .hand-unit.right .number-badge { animation: numDown  2s ease-in-out infinite; }
    .hand-unit.right .hand-svg     { animation: handDown 2s ease-in-out infinite; }

    .hand-svg { width: 160px; height: 210px; }
  </style>
</head>
<body>

  <div id="splash">
    <div class="splash-icon">▶</div>
    <div class="splash-label">click anywhere to play</div>
  </div>

  <div class="hands-container">
    <div class="hand-unit left">
      <div class="number-badge">6</div>
      <svg class="hand-svg" viewBox="0 0 160 210" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="skinL" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F5C5A3"/>
            <stop offset="100%" style="stop-color:#E8A87C"/>
          </linearGradient>
          <linearGradient id="palmL" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#F0B993"/>
            <stop offset="100%" style="stop-color:#D9956A"/>
          </linearGradient>
        </defs>
        <rect x="25" y="100" width="115" height="90" rx="18" fill="url(#palmL)" />
        <rect x="10" y="110" width="30" height="55" rx="14" fill="url(#skinL)" />
        <ellipse cx="24" cy="110" rx="15" ry="10" fill="url(#skinL)" />
        <rect x="30" y="48" width="28" height="60" rx="13" fill="url(#skinL)" />
        <ellipse cx="44" cy="48" rx="14" ry="10" fill="url(#skinL)" />
        <rect x="63" y="38" width="28" height="68" rx="13" fill="url(#skinL)" />
        <ellipse cx="77" cy="38" rx="14" ry="10" fill="url(#skinL)" />
        <rect x="96" y="45" width="26" height="62" rx="12" fill="url(#skinL)" />
        <ellipse cx="109" cy="45" rx="13" ry="10" fill="url(#skinL)" />
        <rect x="124" y="62" width="22" height="48" rx="10" fill="url(#skinL)" />
        <ellipse cx="135" cy="62" rx="11" ry="9" fill="url(#skinL)" />
        <line x1="34" y1="100" x2="56" y2="100" stroke="#D4916A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <line x1="66" y1="100" x2="90" y2="100" stroke="#D4916A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <line x1="98" y1="100" x2="120" y2="100" stroke="#D4916A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <line x1="125" y1="104" x2="144" y2="104" stroke="#D4916A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <path d="M30 145 Q80 138 135 148" stroke="#C9845A" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
        <path d="M25 160 Q80 153 138 162" stroke="#C9845A" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>
      </svg>
    </div>

    <div class="hand-unit right">
      <div class="number-badge">7</div>
      <svg class="hand-svg" viewBox="0 0 160 210" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="skinR" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F5C5A3"/>
            <stop offset="100%" style="stop-color:#E8A87C"/>
          </linearGradient>
          <linearGradient id="palmR" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#F0B993"/>
            <stop offset="100%" style="stop-color:#D9956A"/>
          </linearGradient>
        </defs>
        <rect x="25" y="100" width="115" height="90" rx="18" fill="url(#palmR)" />
        <rect x="10" y="110" width="30" height="55" rx="14" fill="url(#skinR)" />
        <ellipse cx="24" cy="110" rx="15" ry="10" fill="url(#skinR)" />
        <rect x="30" y="48" width="28" height="60" rx="13" fill="url(#skinR)" />
        <ellipse cx="44" cy="48" rx="14" ry="10" fill="url(#skinR)" />
        <rect x="63" y="38" width="28" height="68" rx="13" fill="url(#skinR)" />
        <ellipse cx="77" cy="38" rx="14" ry="10" fill="url(#skinR)" />
        <rect x="96" y="45" width="26" height="62" rx="12" fill="url(#skinR)" />
        <ellipse cx="109" cy="45" rx="13" ry="10" fill="url(#skinR)" />
        <rect x="124" y="62" width="22" height="48" rx="10" fill="url(#skinR)" />
        <ellipse cx="135" cy="62" rx="11" ry="9" fill="url(#skinR)" />
        <line x1="34" y1="100" x2="56" y2="100" stroke="#D4916A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <line x1="66" y1="100" x2="90" y2="100" stroke="#D4916A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <line x1="98" y1="100" x2="120" y2="100" stroke="#D4916A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <line x1="125" y1="104" x2="144" y2="104" stroke="#D4916A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <path d="M30 145 Q80 138 135 148" stroke="#C9845A" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
        <path d="M25 160 Q80 153 138 162" stroke="#C9845A" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>
      </svg>
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <script>
    var splash  = document.getElementById('splash');
    var audio   = document.getElementById('bgMusic');
    var started = false;

    function dismissSplash() {
      splash.style.transition = 'opacity 0.4s';
      splash.style.opacity = '0';
      setTimeout(function() { splash.style.display = 'none'; }, 420);
    }

    function startMusic() {
      if (started) return;
      started = true;

      // Always dismiss the splash — no matter what happens with audio
      dismissSplash();

      // Try to play audio, but don't block anything if it fails
      try {
        var p = audio.play();
        if (p !== undefined) {
          p.catch(function(err) {
            console.warn('Audio could not play:', err.message);
          });
        }
      } catch(e) {
        console.warn('Audio error:', e);
      }
    }

    splash.addEventListener('click', startMusic);
    document.addEventListener('click', startMusic);
    document.addEventListener('keydown', startMusic);
  </script>
</body>
</html>
